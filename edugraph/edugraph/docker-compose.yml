version: "3.8"

services:

  # Conteneur MongoDB
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Conteneur Neo4j
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/edugraph123
    volumes:
      - neo4j_data:/data

  # Conteneur Python — notre app
  app:
    build: .
    depends_on:
      - mongodb
      - neo4j
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=edugraph123

volumes:
  mongo_data:
  neo4j_data: